<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payroll Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background-color: #f5f6fa;
            font-family: 'Segoe UI', sans-serif;
        }
        .sidebar {
            width: 220px;
            background: linear-gradient(to bottom, #003366, #005599);  /* Smooth gradient */
            color: white;
            height: 100vh;
            position: fixed;
        }
        
        .sidebar h4 {
            padding: 20px;
            margin: 0;
            background-color: rgba(0, 0, 0, 0.2); /* semi-transparent overlay */
        }

/*         .sidebar {
            width: 220px;
            background-color: #0d1b3d;
            color: white;
            height: 100vh;
            position: fixed;
        }

        .sidebar h4 {
            padding: 20px;
            margin: 0;
            background-color: #0b1633;
        } */

        .sidebar ul {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        .sidebar ul li {
            padding: 12px 20px;
            transition: 0.3s;
        }
        .sidebar ul li:hover,
        .sidebar ul li.active {
            background-color: #004080; /* brighter blue or just use a darkened #003366 */
            cursor: pointer;
        }

/*         .sidebar ul li:hover,
        .sidebar ul li.active {
            background-color: #13294b;
            cursor: pointer;
        } */

        .main {
            margin-left: 220px;
            padding: 20px;
        }

        .topbar {
            background-color: #ffffff;
            padding: 15px 20px;
            border-bottom: 1px solid #dee2e6;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-stats {
            background-color: #ffffff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
            margin-top: 20px;
        }
    </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <h4>VEI Hospital</h4>
    <ul>
        <li onclick="window.location.href='/'">Home</li>
        <li onclick="window.location.href='/doctor-biodata'">Doctor Biodata</li>
<!--         <li>Patients</li>
        <li>Appointments</li> -->
        <li class="active" onclick="window.location.href='/payroll'">Payroll</li>
<!--         <li>Reports</li>
        <li>Settings</li> -->
    </ul>
</div>

<!-- Main Content -->
<div class="main">
    <div class="topbar">
        <h4>Payroll File Upload & Payslip Generator</h4>
    </div>

    <!-- Banner Message (auto-hide after 5s) -->
    {% if zip_filename %}
      <!-- Hidden link to trigger auto-download -->
      <a id="autoDownloadLink" href="{{ url_for('serve_zip_file', filename=zip_filename) }}" download style="display: none;"></a>

      <!-- Optional toast/banner message (you can remove if not needed) -->
      <div id="bannerMessage" class="alert alert-success text-center fw-bold" role="alert">
        Your download is starting...
      </div>

      <script>
        window.addEventListener('DOMContentLoaded', function () {
          const link = document.getElementById('autoDownloadLink');
          if (link) {
            link.click();
          }
          // Optional: Hide the message after 5 seconds
          setTimeout(() => {
            const banner = document.getElementById('bannerMessage');
            if (banner) banner.style.display = 'none';
          }, 5000);
        });
      </script>
    {% endif %}
<!--    <div id="bannerMessage" class="alert text-center fw-bold d-none" role="alert"></div>-->
<!--    <a id="hiddenZipDownload" style="display:none;"></a>-->

    <!-- Card -->
    <div class="card-stats mt-4">

        <!-- Download Template -->
        <form method="GET" action="/download-payslip-template" class="mb-4">
            <button type="submit" class="btn btn-outline-secondary">Download Payslip Template</button>
        </form>

        <!-- Upload File + Generate Payslip in One Step -->
        <form method="POST" action="/generate-payslips" enctype="multipart/form-data" class="mb-4">
            <div class="mb-3">
                <label for="payroll_file" class="form-label">Upload CSV/Excel File</label>
                <input type="file" name="payroll_file" id="payroll_file" class="form-control" required accept=".csv,.xlsx">
            </div>
            <button type="submit" class="btn btn-success">Generate Payslip ZIP</button>
        </form>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Banner Message Auto-hide Script -->
<script>
    function showBannerMessage(message, type = 'success') {
        const banner = document.getElementById('bannerMessage');
        banner.className = `alert alert-${type} text-center fw-bold`;
        banner.textContent = message;
        banner.classList.remove('d-none');

        setTimeout(() => {
            banner.classList.add('d-none');
        }, 5000);
    }

    // Show message if banner_message exists in query params
    window.addEventListener('DOMContentLoaded', () => {
        const params = new URLSearchParams(window.location.search);
        const msg = params.get('banner_message');
        const type = params.get('banner_type') || 'success';
        if (msg) showBannerMessage(msg, type);
    });

      banner.classList.add('d-none');
    }, 5000);
  }

</body>
</html>
