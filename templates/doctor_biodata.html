<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Doctor Biodata</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background-color: #f5f6fa;
            font-family: 'Segoe UI', sans-serif;
        }
        .sidebar {
            width: 220px;
            background: linear-gradient(to bottom, #003366, #005599);  /* Smooth gradient */
            color: white;
            height: 100vh;
            position: fixed;
        }
        
        .sidebar h4 {
            padding: 20px;
            margin: 0;
            background-color: rgba(0, 0, 0, 0.2); /* semi-transparent overlay */
        }

/*         .sidebar {
            width: 220px;
            background-color: #0d1b3d;
            color: white;
            height: 100vh;
            position: fixed;
        }

        .sidebar h4 {
            padding: 20px;
            margin: 0;
            background-color: #0b1633;
        } */

        .sidebar ul {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        .sidebar ul li {
            padding: 12px 20px;
            transition: 0.3s;
        }
        .sidebar ul li:hover,
        .sidebar ul li.active {
            background-color: #004080; /* brighter blue or just use a darkened #003366 */
            cursor: pointer;
        }

/*         .sidebar ul li:hover,
        .sidebar ul li.active {
            background-color: #13294b;
            cursor: pointer;
        } */

        .main {
            margin-left: 220px;
            padding: 20px;
        }

        .topbar {
            background-color: #ffffff;
            padding: 15px 20px;
            border-bottom: 1px solid #dee2e6;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .profile-img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: #6c757d;
        }

        .dropdown-menu-end {
            right: 0;
            left: auto;
        }

        .biodata-panel {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.06);
        }

        .section-title {
            font-weight: 600;
            font-size: 1.5rem;
            color: #333;
        }

        .nav-btn-group .btn {
            margin: 0 10px 10px 0;
            font-weight: 500;
            min-width: 180px;
        }

        .nav-btn-group .btn.active {
            background-color: #0d47a1;
            color: #fff;
        }

        @media (max-width: 768px) {
            .nav-btn-group .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <h4>VEI Hospital</h4>
    <ul>
        <li onclick="window.location.href='/home'">Home</li>
        <li class="active" onclick="window.location.href='/doctor-biodata'">Doctor Biodata</li>
<!--         <li>Patients</li>
        <li>Appointments</li> -->
        <li onclick="window.location.href='/payroll'">Payroll</li>
<!--         <li>Reports</li>
        <li>Settings</li> -->
    </ul>
</div>

<!-- Main Content -->
<div class="main">
    <!-- Top Bar -->
    <div class="topbar">
        <h5 class="mb-0">Doctor Biodata Section</h5>

        <!-- User Icon with Dropdown -->
        <div class="dropdown">
            <a href="#" class="d-flex align-items-center text-decoration-none dropdown-toggle" id="userDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                <div class="profile-img me-2"></div>
                <span class="fw-semibold text-dark">Admin</span>
            </a>
            <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
                <li><a class="dropdown-item" href="#">Profile</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item text-danger" href="{{ url_for('logout') }}">Logout</a></li>
            </ul>
        </div>
    </div>

    <!-- Biodata Panel -->
    <div class="biodata-panel mt-4">
        <div class="nav-btn-group d-flex flex-wrap mb-4">
            <a href="{{ url_for('new_biodata') }}" class="btn btn-outline-primary {% if request.path == '/doctor-biodata/new' %}active{% endif %}">📝 New Submission</a>
            <a href="{{ url_for('view_biodata') }}" class="btn btn-outline-primary {% if request.path == '/doctor-biodata/view' %}active{% endif %}">📄 View/Edit Submission</a>
            <a href="{{ url_for('download_biodata') }}" class="btn btn-outline-primary {% if request.path == '/doctor-biodata/download' %}active{% endif %}">⬇️ Download</a>
        </div>

        <p class="text-muted">Use the above options to manage doctor biodata submissions.</p>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
